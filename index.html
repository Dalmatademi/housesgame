<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Houses Game</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#1a1a2e; overflow:hidden; font-family:'Segoe UI',Arial,sans-serif; }

  /* SELECTION SCREEN */
  #select-screen {
    position:fixed; inset:0; z-index:10;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    background:linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    transition:opacity 0.6s, visibility 0.6s;
  }
  #select-screen.hidden { opacity:0; visibility:hidden; pointer-events:none; }
  #select-screen h1 {
    color:#fff; font-size:3rem; margin-bottom:8px;
    text-shadow:0 0 30px rgba(120,100,255,0.6);
    letter-spacing:2px;
  }
  #select-screen p.sub {
    color:#aaa; font-size:1.1rem; margin-bottom:30px;
  }
  .char-grid {
    display:flex; gap:28px; flex-wrap:wrap; justify-content:center;
  }
  .char-card {
    width:200px; height:320px; border-radius:18px;
    cursor:pointer; position:relative;
    background:#1e1e3a;
    border:3px solid transparent;
    transition:all 0.3s ease;
    overflow:hidden;
  }
  .char-card:hover {
    border-color:#8b7cff;
    transform:translateY(-12px) scale(1.05);
    box-shadow:0 20px 50px rgba(100,80,255,0.35);
  }
  .char-card.selected {
    border-color:#ff6b9d;
    box-shadow:0 0 40px rgba(255,107,157,0.5);
  }
  .char-card .sprite {
    width:100%; height:240px;
    background-size:100% auto;
    background-repeat:no-repeat;
    background-position:center top;
    image-rendering:auto;
  }
  .char-card .label {
    text-align:center; color:#ccc; padding:10px;
    font-weight:700; font-size:1rem;
    letter-spacing:1px;
  }
  .char-card:hover .label { color:#fff; }
  #join-btn {
    margin-top:32px; padding:14px 50px;
    font-size:1.3rem; font-weight:bold;
    border:none; border-radius:30px;
    cursor:pointer; letter-spacing:1px;
    background:linear-gradient(135deg, #ff6b9d, #c44dff);
    color:#fff; box-shadow:0 8px 30px rgba(200,80,255,0.3);
    transition:all 0.3s;
  }
  #join-btn:hover {
    transform:scale(1.08);
    box-shadow:0 12px 40px rgba(200,80,255,0.5);
  }
  #join-btn:disabled {
    opacity:0.4; cursor:not-allowed; transform:none;
    box-shadow:none;
  }

  /* GAME CANVAS */
  #game-canvas { display:block; }
</style>
</head>
<body>

<!-- CHARACTER SELECTION -->
<div id="select-screen">
  <h1>🏠 HOUSES GAME</h1>
  <p class="sub">Choose your character</p>
  <div class="char-grid" id="char-grid"></div>
  <button id="join-btn" disabled>🎮 JOIN GAME</button>
</div>

<canvas id="game-canvas"></canvas>

<!-- Music -->
<audio id="bg-music" loop preload="auto"
  src="dalmat578_Celestial Arcane Pulse.mp3"></audio>

<script>
// ============================================================
// CHARACTER ASSETS: individual images
// ============================================================
const CHAR_IMGS = [
  "char-engineer.png",
  "char-speedster.png",
  "char-shadow.png",
  "char-hipster.png"
];
const BG_IMG = "gemini-2.5-flash-image_make_a_background_that_goes_with_the_characters-0.jpg";
const NUM_CHARS = 4;

// Player state
let selectedChar = -1;
let playerX = 400, playerY = 300;
let playerScale = 1.8;
let keys = {};
let gameStarted = false;

// Assets
let charImgs = [];
let bgImg;
let cameraX = 0, cameraY = 0;
let worldW = 2000, worldH = 2000;

// DOM
const selectScreen = document.getElementById('select-screen');
const joinBtn = document.getElementById('join-btn');
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const music = document.getElementById('bg-music');

// ============================================================
// CHARACTER DATA
// ============================================================
const charColors = ['#4ade80', '#f87171', '#60a5fa', '#c084fc'];
const charNames  = ['Engineer', 'Speedster', 'Shadow', 'Hipster'];
const charCSSColors = ['green', 'red', 'blue', 'purple'];

// ============================================================
// BUILD SELECTION UI
// ============================================================
const grid = document.getElementById('char-grid');
for (let i = 0; i < NUM_CHARS; i++) {
  const card = document.createElement('div');
  card.className = 'char-card';
  card.style.setProperty('--char-color', charColors[i]);
  card.innerHTML = `
    <div class="sprite" style="
      background-image:url('${CHAR_IMGS[i]}');
      background-size:contain;
      background-position:center;
    "></div>
    <div class="label" style="color:${charColors[i]}; font-size:1.1rem;">${charNames[i]}</div>`;
  card.addEventListener('click', () => selectCharacter(i, card));
  grid.appendChild(card);
}

// Per-character hover glow
const style = document.createElement('style');
style.textContent = charColors.map((c,i) =>
  `.char-card:nth-child(${i+1}):hover { border-color:${c}; box-shadow:0 20px 50px ${c}44; }`
).join('\n');
document.head.appendChild(style);

const cards = document.querySelectorAll('.char-card');
function selectCharacter(idx, el) {
  cards.forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedChar = idx;
  joinBtn.disabled = false;
  joinBtn.textContent = `🎮 JOIN AS ${charNames[idx].toUpperCase()}`;
}

// ============================================================
// JOIN GAME
// ============================================================
joinBtn.addEventListener('click', () => {
  if (selectedChar < 0) return;
  selectScreen.classList.add('hidden');
  startGame();
});

// ============================================================
// GAME START
// ============================================================
function startGame() {
  gameStarted = true;
  resizeCanvas();
  playerX = worldW / 2;
  playerY = worldH / 2;
  cameraX = playerX - canvas.width / 2;
  cameraY = playerY - canvas.height / 2;

  // Start music
  music.volume = 0.5;
  music.play().catch(() => {});

  requestAnimationFrame(gameLoop);
}

// ============================================================
// LOAD IMAGES
// ============================================================
function loadImage(src) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => { console.warn('Failed to load:', src); resolve(null); };
    img.src = src;
  });
}

// ============================================================
// RESIZE
// ============================================================
function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', () => {
  resizeCanvas();
  if (gameStarted) {
    cameraX = playerX - canvas.width / 2;
    cameraY = playerY - canvas.height / 2;
  }
});

// ============================================================
// INPUT
// ============================================================
window.addEventListener('keydown', e => { keys[e.key] = true; e.preventDefault(); });
window.addEventListener('keyup',   e => { keys[e.key] = false; e.preventDefault(); });

// ============================================================
// GAME LOOP
// ============================================================
const SPEED = 5;

function update() {
  let dx = 0, dy = 0;
  if (keys['w'] || keys['W'] || keys['ArrowUp'])    dy -= SPEED;
  if (keys['s'] || keys['S'] || keys['ArrowDown'])  dy += SPEED;
  if (keys['a'] || keys['A'] || keys['ArrowLeft'])  dx -= SPEED;
  if (keys['d'] || keys['D'] || keys['ArrowRight']) dx += SPEED;

  // Normalize diagonal
  if (dx && dy) { dx *= 0.707; dy *= 0.707; }

  playerX = Math.max(30, Math.min(worldW - 30, playerX + dx));
  playerY = Math.max(30, Math.min(worldH - 30, playerY + dy));

  // Smooth camera
  cameraX += (playerX - canvas.width/2 - cameraX) * 0.12;
  cameraY += (playerY - canvas.height/2 - cameraY) * 0.12;
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Background
  if (bgImg) {
    // Tile background if world is larger
    const scale = Math.max(worldW / bgImg.width, worldH / bgImg.height);
    const bw = bgImg.width * scale;
    const bh = bgImg.height * scale;
    ctx.drawImage(bgImg, -cameraX, -cameraY, bw, bh);
  } else {
    // Fallback gradient
    const grad = ctx.createLinearGradient(0,0,canvas.width,canvas.height);
    grad.addColorStop(0, '#0f0c29');
    grad.addColorStop(0.5, '#302b63');
    grad.addColorStop(1, '#24243e');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  // Houses / structures (decorative)
  drawHouses();

  // Player character
  if (charImgs[selectedChar]) {
    const img = charImgs[selectedChar];
    const pw = img.width * playerScale * 0.25;
    const ph = img.height * playerScale * 0.25;
    const px = playerX - cameraX - pw/2;
    const py = playerY - cameraY - ph/2;

    ctx.save();
    ctx.shadowColor = charColors[selectedChar] + '88';
    ctx.shadowBlur = 20;
    ctx.drawImage(img, px, py, pw, ph);
    ctx.restore();

    // Name tag
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    const nameText = charNames[selectedChar];
    const tagW = ctx.measureText(nameText).width + 20;
    ctx.fillRect(px + pw/2 - tagW/2, py - 24, tagW, 18);
    ctx.fillStyle = charColors[selectedChar];
    ctx.font = 'bold 12px "Segoe UI",Arial';
    ctx.textAlign = 'center';
    ctx.fillText(nameText, px + pw/2, py - 10);
  }

  // Minimap
  drawMinimap();

  // HUD
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, canvas.width, 40);
  ctx.fillStyle = '#fff';
  ctx.font = '14px "Segoe UI",Arial';
  ctx.textAlign = 'left';
  ctx.fillText(`🏠 Houses Game — ${charNames[selectedChar]}`, 16, 26);
  ctx.textAlign = 'right';
  ctx.fillText('WASD / Arrows to move', canvas.width - 16, 26);

  // Join instruction if other players (placeholder)
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.font = '13px "Segoe UI",Arial';
  ctx.fillText('More players can join by opening this page!', canvas.width/2, canvas.height - 12);
}

// ============================================================
// DECORATIVE HOUSES
// ============================================================
const houses = [
  {x:300,y:400,w:80,c:'#e85d75'},{x:700,y:600,w:90,c:'#f4a261'},
  {x:1200,y:300,w:70,c:'#2a9d8f'},{x:500,y:1000,w:85,c:'#e9c46a'},
  {x:1100,y:900,w:75,c:'#dda15e'},{x:1600,y:500,w:95,c:'#606c38'},
  {x:1500,y:1200,w:80,c:'#bc6c25'},{x:800,y:1300,w:70,c:'#283618'},
  {x:1800,y:800,w:90,c:'#9b5de5'},{x:200,y:800,w:85,c:'#f15bb5'},
  {x:900,y:200,w:75,c:'#00bbf9'},{x:1400,y:150,w:80,c:'#fee440'},
];

function drawHouses() {
  for (const h of houses) {
    const sx = h.x - cameraX;
    const sy = h.y - cameraY;
    if (sx < -100 || sx > canvas.width+100 || sy < -100 || sy > canvas.height+100) continue;

    const w = h.w;
    const bh = w * 0.75;

    // Body
    ctx.fillStyle = h.c;
    ctx.fillRect(sx - w/2, sy - bh/2, w, bh);

    // Roof
    ctx.fillStyle = '#3d2b1f';
    ctx.beginPath();
    ctx.moveTo(sx - w/2 - 10, sy - bh/2);
    ctx.lineTo(sx, sy - bh/2 - w*0.5);
    ctx.lineTo(sx + w/2 + 10, sy - bh/2);
    ctx.closePath();
    ctx.fill();

    // Door
    ctx.fillStyle = '#5c3a21';
    ctx.fillRect(sx - w*0.12, sy + bh/2 - w*0.25, w*0.24, w*0.25);

    // Window
    ctx.fillStyle = '#ffecb3';
    ctx.fillRect(sx + w*0.15, sy - bh/2 + w*0.1, w*0.2, w*0.2);
    ctx.strokeStyle = '#5c3a21';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(sx + w*0.15, sy - bh/2 + w*0.1, w*0.2, w*0.2);
    ctx.beginPath();
    ctx.moveTo(sx + w*0.25, sy - bh/2 + w*0.1);
    ctx.lineTo(sx + w*0.25, sy - bh/2 + w*0.3);
    ctx.moveTo(sx + w*0.15, sy - bh/2 + w*0.2);
    ctx.lineTo(sx + w*0.35, sy - bh/2 + w*0.2);
    ctx.stroke();
  }
}

// ============================================================
// MINIMAP
// ============================================================
function drawMinimap() {
  const mw = 150, mh = 150;
  const mx = canvas.width - mw - 16, my = 56;
  const sc = mw / worldW;

  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(mx, my, mw, mh);
  ctx.strokeStyle = '#8b7cff';
  ctx.lineWidth = 2;
  ctx.strokeRect(mx, my, mw, mh);

  // Houses on minimap
  for (const h of houses) {
    ctx.fillStyle = h.c;
    ctx.fillRect(mx + h.x*sc - 1.5, my + h.y*sc - 1.5, 3, 3);
  }

  // Player dot
  ctx.fillStyle = '#ff6b9d';
  ctx.beginPath();
  ctx.arc(mx + playerX*sc, my + playerY*sc, 4, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Camera viewport
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.strokeRect(
    mx + cameraX*sc, my + cameraY*sc,
    canvas.width*sc, canvas.height*sc
  );
}

// ============================================================
// BOOT
// ============================================================
async function boot() {
  charImgs = await Promise.all(CHAR_IMGS.map(loadImage));
  bgImg = await loadImage(BG_IMG);
  if (bgImg) {
    worldW = bgImg.width * 2;
    worldH = bgImg.height * 2;
  }
}
boot();

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}
</script>
</body>
</html>
